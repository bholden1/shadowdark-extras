name: Create Module Files For GitHub Release

env:
  project_url: 'https://github.com/${{github.repository}}' 
  latest_manifest_url: 'https://github.com/${{github.repository}}/releases/latest/download/module.json'
  release_system_url: 'https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.zip'

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Modify System Manifest With Release-Specific Values
        id: sub_manifest_link_version
        uses: cschleiden/replace-tokens@v1
        with:
          files: 'module.json'
        env:
          VERSION: ${{github.event.release.tag_name}}
          URL: ${{ env.project_url }}
          MANIFEST: ${{ env.latest_manifest_url }}
          DOWNLOAD: ${{ env.release_system_url }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dev Dependencies
        run: npm ci

      - name: Build Compendium Packs From YAML Source
        run: npm run pack

      - name: Verify Packs Are Non-Empty
        # Guard against shipping a release with empty/corrupt compendiums
        # (every declared pack must have compiled LevelDB data, i.e. a .ldb file).
        run: |
          fail=0
          for path in $(node -e "JSON.parse(require('fs').readFileSync('module.json','utf8')).packs.forEach(p=>console.log(p.path))"); do
            if ! ls "$path"/*.ldb >/dev/null 2>&1; then
              echo "::error::Pack '$path' has no compiled .ldb data — refusing to ship empty compendium."
              fail=1
            else
              echo "OK: $path"
            fi
          done
          [ "$fail" = "0" ]

      - name: Create Module Archive
        run: |
          zip -r module.zip module.json README.md LICENSE data/ i18n/ scripts/ styles/ templates/ packs/ assets/ art/ libs/ greensock/

      - name: Update Release With Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: false
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json, ./module.zip'
          tag: ${{github.event.release.tag_name}}
          body: ${{github.event.release.body}}
