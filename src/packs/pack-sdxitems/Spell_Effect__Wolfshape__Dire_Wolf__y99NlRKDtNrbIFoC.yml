system:
  description: >-
    <p><strong>Dire Wolf</strong></p><p><strong>AC</strong> 12,
    <strong>HP</strong> 19, <strong>ATK</strong> 2 bite [[/r 1d20+4]] ([[/r
    1d8]]), <strong>MV</strong> double near, <strong>S</strong> +3,
    <strong>D</strong> +2, <strong>C</strong> +1</p><p><strong>Pack
    Hunter.</strong> Deals +1 damage while an ally is close.</p><p>You assume
    the wolf's STR, DEX, CON, HP, AC, speed, attacks, and physical
    characteristics, but retain your INT, WIS, and CHA.</p><p>You can cast
    spells in this form. If you go to 0 HP, you revert to your true shape at 0
    HP.</p>
