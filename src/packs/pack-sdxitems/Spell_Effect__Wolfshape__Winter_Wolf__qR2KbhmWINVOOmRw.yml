system:
  description: >-
    <p><strong>Winter Wolf</strong></p><p><strong>AC</strong> 12,
    <strong>HP</strong> 23, <strong>ATK</strong> 2 bite [[/r 1d20+4]] ([[/r
    1d6]]) or 1 frost breath, <strong>MV</strong> double near,
    <strong>S</strong> +3, <strong>D</strong> +2, <strong>C</strong>
    +1</p><p><strong>Impervious.</strong> Cold immune.</p><p><strong>Frost
    Breath.</strong> Fills a near-sized cube extending from winter wolf. [[check
    15 dex]] or [[/r 3d8]] damage. Cannot use again for [[/r 1d4]]
    rounds.</p><p>You assume the wolf's STR, DEX, CON, HP, AC, speed, attacks,
    and physical characteristics, but retain your INT, WIS, and CHA.</p><p>You
    can cast spells in this form. If you go to 0 HP, you revert to your true
    shape at 0 HP.</p>
